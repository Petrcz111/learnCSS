<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body{
            background-color: rgb(56, 56, 56);
        }

        .box{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            background-color: rgb(123, 165, 192);
            margin: 50px;
            box-shadow: 0px 0px 30px 20px rgba(255, 0, 0, 0.5);
        }

        .box p{
            color: rgb(0, 0, 0);
            font-size: 24px;
            text-shadow: 1px 0px 10px rgb(247, 0, 255);
        }
    </style>
</head>
<body>
    <div class="box"><p>Text se stínem</p></div>
</body>
