<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #e100ff;
            font-family: 'Inter', sans-serif;
        }
        .block {
            display: inline-block;
            background-color: #15a02c;
            padding: 20px;
            width: 50px;
            height: 50px;
            animation: rotate 3s steps(6) infinite;
        }
        .block2 {
            display: block;
            background-color: #1715a0;
            padding: 20px;
            width: 50px;
            height: 50px;
            animation: expand 1s ease-in infinite;
            position: relative;
            left: 200px;
            top: 100px;
            color: white;
            box-shadow: 0 0 40px 20px #47aa05;
        }
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
                background-color: rgb(255, 0, 0);
            }
        }
        @keyframes expand{
            from {
                transform: scale(1);
            }
            to {
                transform: scaleX(5);
            }
        }


    </style>
</head>
<body>
    <h1>Různé animace</h1>
    <div class="block">steps</div>
    <div class="block2">ease-in</div>
</body>
</html>
