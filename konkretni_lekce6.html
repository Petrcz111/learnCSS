                <h2>Teorie</h2>
                <p>Grid je model rozložení, který umožňuje jednoduše řídit rozložení prvků v kontejneru.<br>
                    <span>display: grid; </span>zapne grid na prvku <br>
                    <span>grid-template-columns </span>definuje počet sloupců a jejich šířku<br>
                    <span>grid-template-rows </span>definuje počet řádků a jejich výšku
                </p>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body{
            background-color: rgb(255, 255, 255);
        }

        .container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 10px;
        }

        .box{
            background-color: rgb(164, 119, 201);
        }

        .box.special{
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box special">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>
</body>
