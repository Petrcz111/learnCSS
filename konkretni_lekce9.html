                <h2>Teorie</h2>
                <p>Transformace v CSS umožňuje měnit tvar, velikost a pozici prvků na stránce.<br>
                    <span>transform: scale </span>změní velikost prvku<br>
                    <span>transform: rotate </span>otočí prvek<br>
                    <span>transform: skew </span>zkosí prvek

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body{
            background-color: rgb(255, 255, 255);
        }

        .box1, .box2, .box3{
            display: inline-block;
            width: 100px;
            height: 100px;
            background-color: rgb(122, 25, 233);
            margin: 30px;
            font-size: 30px;
            text-align: center;
            color: rgb(255, 255, 255);
        }

        .box1:hover{
            transform: scale(1.5);
        }

        .box2:hover{
            transform: rotate(45deg);
        }

        .box3:hover{
            transform: skew(-50deg);
        }

    </style>
</head>
<body>
    <h1>Najeďte na čtverce</h1>
    <div class="box1">scale</div>
    <div class="box2">rotate</div>
    <div class="box3">skew</div>
</body>
