<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body{
            background-color: rgb(255, 255, 255);
        }

        .color{
            color: rgb(158, 22, 22);
        }

        .size{
            font-size: 50px;
        }

        .font{
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1 class="color">barva</h1>
    <h2 class="size">velikost</h2>
